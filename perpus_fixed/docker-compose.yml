services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: perpus_app
    volumes:
      - .:/var/www
      - /var/www/vendor
    depends_on:
      - mysql
    networks:
      - perpus_network

  nginx:
    image: nginx:alpine
    container_name: perpus_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - perpus_network

  mysql:
    image: mysql:8.0
    container_name: perpus_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: perpustakaan
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: perpus
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - perpus_mysql:/var/lib/mysql
    networks:
      - perpus_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: perpus_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: secret
    depends_on:
      - mysql
    networks:
      - perpus_network

networks:
  perpus_network:
    driver: bridge

volumes:
  perpus_mysql:
